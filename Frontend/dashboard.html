<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintrack Dashboard</title>
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="container">
        <h1>FinTrack</h1>
        <div class="cards">
            <div class="card">
                <h3>Total Income</h3>
                <p id="totalIncome"></p>
            </div>
            <div class="card">
                <h3>Total Expense</h3>
                <p id="totalExpense"></p>
            </div>
            <div class="card">
                <h3>Balance</h3>
                <p id="balance"></p>
            </div>
        </div>

        <div class="charts">
            <div class="chart-box">
                <canvas id="incomeExpenseChart"></canvas>
            </div>
            <div class="chart-box">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <button id="openModal" class="add-btn">
            + Add Transaction
        </button>

        <div class="controls">
            <input type="text" id="search" placeholder="Search Transaction">

            <select id="filter">
                <option value="all">All</option>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
            </select>
        </div>

        <div class="transaction-history">
            <h2>Transaction History</h2>

            <table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Date</th>
                        <th>Description</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody id="transactionTable">

                </tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <span id="closeModal">&times;</span>
            <h2>Add Transaction</h2>

            <div class="type-group" id="type">
                <label>
                    <input type="radio" name="type" value="Income">
                    Income
                </label>
                <label>
                    <input type="radio" name="type" value="Expense">
                    Expense
                </label>
            </div>

            <select id="category">
                <option value="">Select Category</option>
                <option>Food</option>
                <option>Shopping</option>
                <option>Salary</option>
                <option>Travel</option>
                <option>Health</option>
                <option>Entertainment</option>
                <option>Investment</option>
                <option>Bills</option>
                <option>Freelancing</option>
                <option>Education</option>
                <option>Other</option>
            </select>

            <input type="number" id="amount" placeholder="Enter Amount">
            <input type="date" id="date">
            <textarea id="description" placeholder="Enter Description"></textarea>

            <button id="addTransactionBtn">Add Transaction</button>
        </div>
    </div>

    <script src="http://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
